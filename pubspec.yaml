name: fade_memo
description: 记忆遗忘模拟器 — 一款模拟人类记忆自然遗忘规律的跨端笔记 App
version: 0.0.1-alpha.2+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4
  intl: ^0.19.0
  url_launcher: ^6.3.0
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.svg